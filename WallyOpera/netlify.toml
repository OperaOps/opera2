# Netlify config for the Opera "Consult Intelligence" demo (WallyOpera),
# deployed as its OWN Netlify site: operawally.netlify.app
# (same repo pattern as OperaTruveta — base directory WallyOpera).
#
# The app is fully static (next.config.mjs has output: "export"), so the build
# emits plain HTML to out/ — no Next.js runtime plugin or functions needed.
#
# If created from the repo UI instead of the CLI:
#   Base directory:    WallyOpera
#   Build command:     npm run build
#   Publish directory: out   (relative to base)

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
